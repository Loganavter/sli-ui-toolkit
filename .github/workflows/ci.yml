name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v4

      - name: Validate release metadata
        run: python3 build/ci/validate_release_metadata.py

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system libs for offscreen Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1 libdbus-1-3

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" build twine

      - name: Run tests
        run: pytest

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate artifacts
        run: python -m twine check dist/*
